@media(max-width:760px){#pheader{padding:18px 20px}#plogo{font-size:24px}.pcontainer{padding:16px 16px 48px}.pexp{flex-direction:column;text-align:center;padding:24px 20px;gap:16px;border-radius:24px;margin-bottom:16px}.pexpinfo{text-align:center}.pcomm{align-items:center;flex-direction:row;gap:8px}.phero{flex-direction:column;text-align:center;padding:28px 22px;gap:18px;border-radius:24px;margin-bottom:20px}.pheroinfo{text-align:center}.pheroname{font-size:28px}.pherobio{font-size:15px;margin-left:auto;margin-right:auto}.pdm{width:100%;padding:14px 22px}.pcard{border-radius:20px}.pinfo{padding:16px 18px}.ptitle{font-size:17px}.psection{font-size:22px;margin-top:24px;margin-bottom:16px}#kn{font-size:clamp(56px,16vw,96px);letter-spacing:-1px}#ks{font-size:16px}#khint{font-size:11px;bottom:20px;right:18px}#khint .kdot{width:7px;height:7px}.pmodal.island{max-width:95vw;max-height:95vw}.pbrowser-bar{flex-wrap:wrap}.pbrowser-url{width:100%;order:3;margin-top:8px}.pbrowser-nav{order:1}.pbrowser-btn{width:32px;height:32px}}

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const labels=['software engineer.','full stack dev.','cash lover.'];
let li=0;
const subEl=document.getElementById('ks');
setInterval(()=>{
  subEl.style.opacity='0';
  setTimeout(()=>{li=(li+1)%3;subEl.textContent=labels[li];subEl.style.opacity='1';},560);
},2800);

function updatePresence(){
  fetch('https://api.lanyard.rest/v1/users/1244463352793665616').then(r=>r.json()).then(d=>{
    if(!d||!d.success||!d.data)return;
    const u=d.data.discord_user;
    if(u&&u.avatar){
      const ext=u.avatar.startsWith('a_')?'gif':'png';
      document.getElementById('pavatar').src=`https://cdn.discordapp.com/avatars/${u.id}/${u.avatar}.${ext}?size=256`;
    }
    const status=d.data.discord_status||'offline';
    const el=document.getElementById('pstatus');
    el.className='pstatus '+status;
  }).catch(()=>{});
}
updatePresence();
setInterval(updatePresence,30000);

function init(){
  if(typeof THREE==='undefined'){setTimeout(init,60);return;}
  const wrap=document.getElementById('kw');
  const canvas=document.getElementById('kc');
  const rippleCanvas=document.getElementById('kr');
  const W=wrap.clientWidth||680, H=wrap.clientHeight||460;

  const renderer=new THREE.WebGLRenderer({canvas,alpha:true,antialias:false,powerPreference:'high-performance'});
  renderer.setPixelRatio(Math.min(window.devicePixelRatio,1.5));
  renderer.setSize(W,H);

  rippleCanvas.width=W;
  rippleCanvas.height=H;
  const rCtx=rippleCanvas.getContext('2d');

  const scene=new THREE.Scene();
  const cam=new THREE.PerspectiveCamera(42,W/H,0.1,100);
  cam.position.z=13;

  const amb=new THREE.AmbientLight(0xffffff,0.5);
  scene.add(amb);
  const sun=new THREE.DirectionalLight(0xffffff,1.4);
  sun.position.set(5,7,6);
  scene.add(sun);
  const fill=new THREE.DirectionalLight(0xB8C8E8,0.28);
  fill.position.set(-5,-3,4);
  scene.add(fill);

  const mat=new THREE.MeshStandardMaterial({color:0xBFADA8,roughness:0.62,metalness:0.04});

  const raw=[
    [0,.4,0,1.15],[-1.25,1.05,.3,.88],[1.15,1.35,-.25,.92],
    [-.3,-.85,.5,1.02],[1.45,-.35,.1,.76],[-1.55,-.4,-.25,.82],
    [.55,2.15,.2,.62],[-.82,2.05,-.3,.56],[2.1,.65,.4,.71],
    [-2.05,.85,.1,.73],[.2,-1.95,-.2,.82],[1.3,-1.45,.3,.66],
    [-1.12,-1.62,.42,.61],[2.25,-1.0,-.1,.56],[-2.3,-.95,.2,.51],
    [.72,1.05,1.25,.46],[-.52,-.32,1.05,.51],[1.82,1.82,.5,.46],
    [-1.82,1.92,.32,.43],[0,-2.55,.22,.66],[2.52,0,-.3,.49],
    [-2.5,-1.82,0,.41],[.32,2.85,.5,.39],[1.05,-.5,-1.0,.51],
    [-0.6,0.2,-0.8,.44],[0.0,1.6,0.9,.38],
  ];

  const meshes=raw.map(([x,y,z,r])=>{
    const m=new THREE.Mesh(new THREE.SphereGeometry(r,12,12),mat);
    m.position.set(x,y,z);
    scene.add(m);
    return{m,x,y,z,r,
      p:Math.random()*Math.PI*2,
      p2:Math.random()*Math.PI*2,
      p3:Math.random()*Math.PI*2,
      s:0.12+Math.random()*0.22
    };
  });

  const states=raw.map(([x,y,z])=>({cx:x,cy:y,cz:z,vx:0,vy:0,vz:0}));
  const N=states.length;

  const raycaster=new THREE.Raycaster();
  const mNDC=new THREE.Vector2();
  const plane=new THREE.Plane(new THREE.Vector3(0,0,1),0);
  let mWorld=null;

  wrap.addEventListener('mousemove',e=>{
    const r=wrap.getBoundingClientRect();
    mNDC.x=((e.clientX-r.left)/r.width)*2-1;
    mNDC.y=-((e.clientY-r.top)/r.height)*2+1;
    raycaster.setFromCamera(mNDC,cam);
    const hit=new THREE.Vector3();
    mWorld=raycaster.ray.intersectPlane(plane,hit)?hit:null;
  });
  wrap.addEventListener('mouseleave',()=>{mWorld=null;});

  let ripples=[];
  let transitionTriggered=false;
  let dispersing=false;
  wrap.addEventListener('click',e=>{
    if(transitionTriggered)return;
    const r=wrap.getBoundingClientRect();
    const mx=e.clientX-r.left;
    const my=e.clientY-r.top;
    const maxR=Math.sqrt(
      Math.pow(Math.max(mx,W-mx),2)+
      Math.pow(Math.max(my,H-my),2)
    )+10;
    ripples.push({mx,my,maxR,r:0,alpha:1,phase:'expand',onDone:()=>{
      transitionTriggered=true;
      showPortfolio();
    }});
    dispersing=true;
    mNDC.x=(mx/r.width)*2-1;
    mNDC.y=-(my/r.height)*2+1;
    raycaster.setFromCamera(mNDC,cam);
    const hit=new THREE.Vector3();
    const click3D=raycaster.ray.intersectPlane(plane,hit)?hit:new THREE.Vector3(0,0,0);
    for(let i=0;i<N;i++){
      const st=states[i];
      const dx=st.cx-click3D.x;
      const dy=st.cy-click3D.y;
      const dz=st.cz-click3D.z+0.0001;
      const d=Math.sqrt(dx*dx+dy*dy+dz*dz)||1;
      const force=2.5+Math.random()*1.5;
      st.vx=(dx/d)*force+(Math.random()-0.5)*0.3;
      st.vy=(dy/d)*force+(Math.random()-0.5)*0.3;
      st.vz=(dz/d)*force*0.5+(Math.random()-0.5)*0.3;
    }
  });

  const sites=[
    {name:'Dynamic Achievers',url:'https://www.dynamicachievers.org/'},
    {name:'Astrix',url:'https://astrix-web-panel.vercel.app/'},
    {name:'DS Advisors',url:'https://www.dsadvisors.us/'},
    {name:'XenoxDB',url:'https://xenoxdb.vercel.app/'},
    {name:'Vital Online',url:'https://vitalonline.vercel.app/'},
    {name:'SkillSpring',url:'https://skillspring-gules.vercel.app/'}
  ];
  const robloxProjects=[
    {name:'Viewmodel Combat Testing',video:'2cwkel'},
    {name:'Anti-Cheat UI Demo Project',video:'ggcmwp'},
    {name:'Animation Test #1',video:'qu2v98'},
    {name:'Animation Test #2',video:'uuzkpt'}
  ];
  const uxProjects=[
    {name:'UX Design #1',image:'https://files.catbox.moe/5g6mim.png'}
  ];
  const container=document.getElementById('pcontainer');
  const portfolioBuilt=(function(){
    const frag=document.createDocumentFragment();
    const fullstackSection=document.createElement('div');
    fullstackSection.className='psection';
    fullstackSection.textContent='Fullstack Projects';
    frag.appendChild(fullstackSection);
    const fullstackGrid=document.createElement('div');
    fullstackGrid.className='pgrid';
    sites.forEach(s=>{
      const card=document.createElement('div');
      card.className='pcard';
      const thumbUrl=`https://api.microlink.io/?url=${encodeURIComponent(s.url)}&screenshot=true&meta=false&embed=screenshot.url&viewport.width=1280&viewport.height=800`;
      card.innerHTML=`<img class="pthumb" src="${thumbUrl}" alt="${s.name}" loading="eager"><div class="pinfo"><div class="ptitle">${s.name}</div><a class="pvisit" href="${s.url}" target="_blank" rel="noopener">Visit</a></div>`;
      card.querySelector('.pthumb').addEventListener('click',e=>{
        e.stopPropagation();
        showBrowser(s.url);
      });
      fullstackGrid.appendChild(card);
    });
    frag.appendChild(fullstackGrid);
    const robloxSection=document.createElement('div');
    robloxSection.className='psection';
    robloxSection.textContent='Roblox Projects';
    frag.appendChild(robloxSection);

    const expSection=document.createElement('div');
    expSection.className='pexp';
    expSection.id='pexp';
    expSection.innerHTML=`<img class="pexpicon" src="https://media.tenor.com/bDmyKRMnKMcAAAAM/like-cat.gif" alt="Experience"><div class="pexpinfo"><div class="pexptext">I've been scripting in <strong>roblox</strong> for 4+ years, animating for 2, and in <strong>UX Design</strong> for 6 Months.</div></div><div class="pcomm"><div class="pcommlabel">Commission Status</div><div class="pcommstatus">Available</div></div>`;
    frag.appendChild(expSection);

    const robloxGrid=document.createElement('div');
    robloxGrid.className='pgrid';
    robloxProjects.forEach(p=>{
      const card=document.createElement('div');
      card.className='pcard video';
      const posterUrl=`https://cdn-cf-east.streamable.com/image/${p.video}.jpg`;
      card.innerHTML=`<div class="pvidposter" style="background-image:url('${posterUrl}')"><div class="pplay"><svg viewBox='0 0 24 24' fill='currentColor'><path d='M8 5v14l11-7z'/></svg></div></div><div class="pinfo"><div class="ptitle">${p.name}</div></div>`;
      card.addEventListener('click',e=>{
        if(e.target.closest('.pinfo'))return;
        const ext=`https://streamable.com/${p.video}`;
        showModalContent(`
          <div style=\"position:relative;width:100%;height:100%;background:#000\">
            <div id="vloading" style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;z-index:1\">
              <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"><animateTransform attributeName="transform" type="rotate" from="0 12 12" to="360 12 12" dur="1s" repeatCount="indefinite"/></svg>
            </div>
            <iframe title=\"${p.name}\" allow=\"autoplay; fullscreen; picture-in-picture\" loading=\"lazy\" src=\"https://streamable.com/e/${p.video}?autoplay=1\" onload=\"document.getElementById('vloading').style.display='none'\" style=\"position:absolute;left:0;top:0;width:100%;height:100%;border:none;overflow:hidden;display:block\"></iframe>
          </div>
        `);
      });
      robloxGrid.appendChild(card);
    });
    frag.appendChild(robloxGrid);

    const uxSection=document.createElement('div');
    uxSection.className='psection';
    uxSection.textContent='UX Design';
    frag.appendChild(uxSection);

    const uxGrid=document.createElement('div');
    uxGrid.className='pgrid';
    uxProjects.forEach(p=>{
      const card=document.createElement('div');
      card.className='pcard';
      card.innerHTML=`<img class="pthumb" src="${p.image}" alt="${p.name}" loading="eager"><div class="pinfo"><div class="ptitle">${p.name}</div></div>`;
      card.querySelector('.pthumb').addEventListener('click',e=>{
        e.stopPropagation();
        showModalContent(`<img src="${p.image}" alt="${p.name}" style="width:100%;height:100%;object-fit:contain">`);
      });
      uxGrid.appendChild(card);
    });
    frag.appendChild(uxGrid);

    const footer=document.createElement('div');
    footer.className='pfooter';
    footer.textContent='more projects on the way, looking forward to your projects!';
    frag.appendChild(footer);

    container.appendChild(frag);
    return Array.from(container.querySelectorAll('.pcard'));
  })();

  let rafRunning=true;

  const modal=document.getElementById('pmodal');
  const modalContent=document.getElementById('pmodalContent');
  const modalIsland=document.getElementById('pmodalIsland');
  const pclose=document.getElementById('pclose');

  function closeModal(){
    modal.classList.remove('show');
    const iframe=modalContent.querySelector('iframe');
    if(iframe)iframe.src='';
    modalContent.innerHTML='';
  }

  pclose.addEventListener('click',closeModal);
  modal.addEventListener('click',e=>{
    if(e.target===modal)closeModal();
  });

  function showModalContent(html){
    modalContent.innerHTML=html;
    modal.classList.add('show');
  }

  const browserModal=document.getElementById('pbrowserModal');
  const browserFrame=document.getElementById('pbrowserFrame');
  const browserUrl=document.getElementById('pbrowserUrl');
  const browserClose=document.getElementById('pbrowserClose');
  const browserBack=document.getElementById('pbrowserBack');
  const browserForward=document.getElementById('pbrowserForward');
  const browserRefresh=document.getElementById('pbrowserRefresh');

  function closeBrowser(){
    browserModal.classList.remove('show');
    browserFrame.src='';
  }

  browserClose.addEventListener('click',closeBrowser);
  browserModal.addEventListener('click',e=>{
    if(e.target===browserModal)closeBrowser();
  });

  browserBack.addEventListener('click',()=>{
    browserFrame.contentWindow.history.back();
  });
  browserForward.addEventListener('click',()=>{
    browserFrame.contentWindow.history.forward();
  });
  browserRefresh.addEventListener('click',()=>{
    browserFrame.src=browserFrame.src;
  });

  function showBrowser(url){
    browserFrame.src=url;
    browserUrl.value=url;
    browserModal.classList.add('show');
  }

  function showPortfolio(){
    document.getElementById('portfolio').classList.add('show');
    document.getElementById('kw').classList.add('hidden');
    document.body.style.overflow='auto';
    requestAnimationFrame(()=>{
      document.getElementById('phero').classList.add('in');
      portfolioBuilt.forEach((card,i)=>{
        setTimeout(()=>card.classList.add('in'),120+i*80);
      });
      setTimeout(()=>document.getElementById('pexp').classList.add('in'),120+portfolioBuilt.length*80+100);
    });
    setTimeout(()=>{
      document.getElementById('kw').style.display='none';
      rafRunning=false;
    },700);
  }

  let t=0;
  (function loop(){
    if(!rafRunning)return;
    requestAnimationFrame(loop);
    t+=.007;

    for(let i=0;i<N;i++){
      const o=meshes[i];
      const st=states[i];
      if(dispersing){
        st.cx+=st.vx;
        st.cy+=st.vy;
        st.cz+=st.vz;
        continue;
      }
      const f1=t*o.s, f2=t*o.s*1.414, f3=t*o.s*0.577, f4=t*o.s*1.732;
      const tx=o.x+Math.sin(f1+o.p)*0.38+Math.sin(f2+o.p2)*0.18;
      const ty=o.y+Math.cos(f1*0.82+o.p)*0.35+Math.cos(f4+o.p2)*0.16;
      const tz=o.z+Math.sin(f3+o.p3)*0.28+Math.cos(f2*0.7+o.p)*0.12;
      st.vx+=(tx-st.cx)*0.016;
      st.vy+=(ty-st.cy)*0.016;
      st.vz+=(tz-st.cz)*0.016;

      if(mWorld){
        const dx=st.cx-mWorld.x, dy=st.cy-mWorld.y, dz=st.cz-mWorld.z*0.1;
        const d2=dx*dx+dy*dy+dz*dz, R=3.0;
        if(d2<R*R&&d2>0.0001){
          const d=Math.sqrt(d2);
          const f=Math.pow((R-d)/R,1.5)*0.22;
          st.vx+=(dx/d)*f; st.vy+=(dy/d)*f; st.vz+=(dz/d)*f*0.15;
        }
      }

      const spd=Math.sqrt(st.vx*st.vx+st.vy*st.vy+st.vz*st.vz);
      if(spd>0.22){const sc=0.22/spd;st.vx*=sc;st.vy*=sc;st.vz*=sc;}
      st.vx*=0.92; st.vy*=0.92; st.vz*=0.92;
      st.cx+=st.vx; st.cy+=st.vy; st.cz+=st.vz;
    }

    if(!dispersing)for(let pass=0;pass<2;pass++){
      for(let i=0;i<N;i++){
        for(let j=i+1;j<N;j++){
          const si=states[i];
          const sj=states[j];
          const dx=sj.cx-si.cx;
          const dy=sj.cy-si.cy;
          const dz=sj.cz-si.cz;
          const d2=dx*dx+dy*dy+dz*dz;
          const minD=meshes[i].r+meshes[j].r;
          if(d2<minD*minD){
            if(d2<0.0001){
              si.cx+=Math.random()*0.02-0.01;
              si.cy+=Math.random()*0.02-0.01;
              continue;
            }
            const d=Math.sqrt(d2);
            const ov=(minD-d)*0.5;
            const nx=dx/d;
            const ny=dy/d;
            const nz=dz/d;
            si.cx-=nx*ov;
            si.cy-=ny*ov;
            si.cz-=nz*ov;
            sj.cx+=nx*ov;
            sj.cy+=ny*ov;
            sj.cz+=nz*ov;
            const rvx=sj.vx-si.vx;
            const rvy=sj.vy-si.vy;
            const rvz=sj.vz-si.vz;
            const dot=rvx*nx+rvy*ny+rvz*nz;
            if(dot<0){
              const imp=dot*0.12;
              si.vx+=imp*nx;
              si.vy+=imp*ny;
              si.vz+=imp*nz;
              sj.vx-=imp*nx;
              sj.vy-=imp*ny;
              sj.vz-=imp*nz;
            }
          }
        }
      }
    }

    for(let i=0;i<N;i++){
      const o=meshes[i], st=states[i];
      o.m.position.set(st.cx,st.cy,st.cz);
      o.m.scale.setScalar(1+Math.sin(t*o.s*1.6+o.p)*0.022);
    }

    renderer.render(scene,cam);

    if(ripples.length>0){
      rCtx.clearRect(0,0,W,H);
      for(const rp of ripples){
        if(rp.phase==='expand'){
          rp.r+=(rp.maxR-rp.r)*0.1+2;
          if(rp.r>=rp.maxR*0.998){
            rp.r=rp.maxR;
            rp.phase='done';
            if(rp.onDone&&!rp.done){rp.done=true;rp.onDone();}
          }
        }
        rCtx.beginPath();
        rCtx.arc(rp.mx,rp.my,rp.r,0,Math.PI*2);
        rCtx.fillStyle=`rgba(255,255,255,${rp.alpha})`;
        rCtx.fill();
      }
    }
  })();

  window.addEventListener('resize',()=>{
    const nw=wrap.clientWidth, nh=wrap.clientHeight;
    cam.aspect=nw/nh; cam.updateProjectionMatrix(); renderer.setSize(nw,nh);
    rippleCanvas.width=nw; rippleCanvas.height=nh;
  });
}
init();
</script>
